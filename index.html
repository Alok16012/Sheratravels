<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shera Travels Itinerary Maker — Create professional Kashmir tour packages with ease." />
    <title>Shera Travels – Itinerary Maker</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant paint: shows while the JS bundle downloads, then React
           replaces #root's contents on mount. Inline so it needs no extra request. -->
      <div id="app-boot">
        <div class="app-boot-spinner"></div>
        <p class="app-boot-text">Loading Shera Travels…</p>
      </div>
    </div>
    <style>
      #app-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; background: #0f1117;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      .app-boot-spinner {
        width: 44px; height: 44px;
        border: 3px solid rgba(255,255,255,0.12);
        border-top-color: #4F6EF7;
        border-radius: 50%;
        animation: app-boot-spin 0.8s linear infinite;
      }
      .app-boot-text { color: #94a3b8; font-size: 13px; letter-spacing: 0.02em; margin: 0; }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
